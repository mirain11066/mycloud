<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>マキノクラウド</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #06080c;
  --surface: #0d1117;
  --card: #131820;
  --border: #1b2230;
  --text: #c9d1d9;
  --dim: #4a5568;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,92,252,0.15);
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  background-image: url('/俺の写真.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  overscroll-behavior: none;
}

/* ── ログイン ── */
.login-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(6,8,12,0.92);
  backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 32px;
  width: min(90vw, 380px);
  text-align: center;
}
.login-box h1 {
  font-size: 1.6rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-box p { color: var(--dim); font-size: 0.85rem; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 14px 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 1rem; outline: none; margin-bottom: 16px;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-size: 1rem; font-weight: 600;
  cursor: pointer; min-height: 48px;
}
.login-error {
  color: var(--red); font-size: 0.85rem;
  margin-top: 12px; display: none;
}

/* ── レイアウト ── */
.app { display: flex; min-height: 100vh; min-height: 100dvh; }

/* サイドバー */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 99;
}
.sidebar .logo {
  font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.sidebar .subtitle { font-size: 0.75rem; color: var(--dim); margin-bottom: 24px; }
.sidebar nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: var(--radius-sm);
  color: var(--dim); text-decoration: none; font-size: 0.9rem;
  transition: all 0.2s; min-height: 44px;
}
.sidebar nav a:hover, .sidebar nav a.active {
  background: var(--accent-glow); color: var(--accent2);
}
.storage-info {
  margin-top: auto; padding: 16px 0;
  border-top: 1px solid var(--border);
}
.storage-bar {
  width: 100%; height: 6px;
  background: var(--card); border-radius: 3px;
  overflow: hidden; margin: 8px 0;
}
.storage-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.5s;
}
.storage-text { font-size: 0.75rem; color: var(--dim); }

/* メイン */
.main {
  flex: 1; margin-left: 240px;
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
}

/* トップバー */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 24px;
  background: rgba(13,17,23,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.hamburger {
  display: none; background: none; border: none;
  color: var(--text); font-size: 1.5rem; cursor: pointer;
  min-width: 44px; min-height: 44px;
  align-items: center; justify-content: center;
}
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.9rem; overflow-x: auto;
  white-space: nowrap; flex: 1;
  scrollbar-width: none;
}
.breadcrumb::-webkit-scrollbar { display: none; }
.breadcrumb span { color: var(--dim); }
.breadcrumb a {
  color: var(--accent2); text-decoration: none;
  padding: 4px 2px;
}
.search-box {
  position: relative; width: 220px; flex-shrink: 0;
}
.search-box input {
  width: 100%; padding: 10px 14px 10px 36px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 0.85rem; outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '🔍'; position: absolute;
  left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 0.85rem;
}
.topbar-actions {
  display: flex; gap: 8px; align-items: center;
}
.topbar-actions button, .btn {
  padding: 8px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  cursor: pointer; font-size: 0.8rem; white-space: nowrap;
  min-height: 44px; min-width: 44px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-actions button:hover, .btn:hover { border-color: var(--accent); color: var(--accent2); }
.btn-logout { color: var(--red) !important; }

/* ツールバー */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px;
  flex-wrap: wrap;
}
.toolbar .btn { font-size: 0.8rem; }
.toolbar .btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; font-weight: 600;
}

/* ファイルグリッド */
.content { flex: 1; padding: 16px 24px 100px; }
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.file-card {
  background: rgba(19,24,32,0.85);
  backdrop-filter: blur(6px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px; text-align: center;
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
.file-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.file-card .icon { font-size: 2.4rem; margin-bottom: 8px; }
.file-card .name {
  font-size: 0.8rem; font-weight: 500;
  word-break: break-all; line-height: 1.3;
}
.file-card .meta { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }
.file-card .actions {
  position: absolute; top: 6px; right: 6px;
  display: flex; gap: 4px; opacity: 0;
  transition: opacity 0.2s;
}
.file-card:hover .actions { opacity: 1; }
.file-card .actions button {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 6px;
  font-size: 0.7rem; cursor: pointer; color: var(--text);
  min-width: 30px; min-height: 30px;
  display: flex; align-items: center; justify-content: center;
}
.file-card .thumb {
  width: 100%; height: 80px;
  object-fit: cover; border-radius: 6px;
  margin-bottom: 8px;
}

/* フローティングアップロードボタン */
.fab-upload {
  display: none;
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom));
  right: 20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; color: #fff; font-size: 1.8rem;
  box-shadow: 0 4px 20px rgba(124,92,252,0.4);
  cursor: pointer; z-index: 80;
  align-items: center; justify-content: center;
}

/* アップロード進捗 */
.upload-progress {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.3s; z-index: 200;
}
.upload-progress.active { transform: translateY(0); }
.upload-progress .bar-track {
  width: 100%; height: 6px;
  background: var(--card); border-radius: 3px;
  overflow: hidden; margin-top: 8px;
}
.upload-progress .bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px; transition: width 0.3s;
}
.upload-progress .text { font-size: 0.85rem; color: var(--dim); }

/* プレビュー */
.preview-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,0.9);
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
}
.preview-overlay.active { display: flex; }
.preview-overlay .close-btn {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none;
  color: #fff; font-size: 2rem; cursor: pointer;
  min-width: 48px; min-height: 48px;
}
.preview-overlay .preview-content {
  max-width: 95vw; max-height: 85vh;
  overflow: auto;
}
.preview-overlay img {
  max-width: 95vw; max-height: 80vh; object-fit: contain;
}
.preview-overlay video, .preview-overlay audio {
  max-width: 95vw;
}
.preview-overlay pre {
  background: var(--card); padding: 20px;
  border-radius: var(--radius); color: var(--text);
  max-width: 95vw; max-height: 80vh; overflow: auto;
  font-size: 0.85rem;
}

/* モーダル */
.modal-overlay {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: min(90vw, 360px);
}
.modal h3 { font-size: 1.1rem; margin-bottom: 16px; }
.modal input {
  width: 100%; padding: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 0.95rem; outline: none; margin-bottom: 16px;
}
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button {
  padding: 10px 20px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 0.9rem;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); min-height: 44px;
}
.modal-btns .primary {
  background: var(--accent); border: none; color: #fff; font-weight: 600;
}

/* 空状態 */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--dim);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

/* ── レスポンシブ ── */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    width: 280px;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-backdrop.open { display: block; }
  .main { margin-left: 0; }
  .hamburger { display: flex; }
  .topbar { padding: 12px 16px; }
  .search-box { width: 100%; order: 10; }
  .topbar { flex-wrap: wrap; }
  .toolbar { padding: 10px 16px; }
  .content { padding: 12px 16px 120px; }
  .file-grid {
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .file-card { padding: 12px; }
  .file-card .icon { font-size: 2rem; }
  .file-card .actions { opacity: 1; }
  .fab-upload { display: flex; }
  .toolbar .btn-accent.desktop-upload { display: none; }
  .login-box { padding: 32px 24px; }
}
@media (max-width: 400px) {
  .file-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}
</style>
</head>
<body>

<!-- ログイン -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>マキノクラウド</h1>
    <p>パーソナルクラウドストレージ</p>
    <input type="password" id="loginPass" placeholder="パスワード" autocomplete="off">
    <button onclick="login()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが違います</div>
  </div>
</div>

<!-- サイドバー背景 -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- アプリ -->
<div class="app" id="app" style="display:none;">
  <!-- サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">マキノクラウド</div>
    <div class="subtitle">Personal Cloud</div>
    <nav>
      <a href="#" class="active" onclick="navigateTo(''); return false;">📁 すべてのファイル</a>
    </nav>
    <div class="storage-info">
      <div class="storage-text" id="storageText">読み込み中...</div>
      <div class="storage-bar"><div class="storage-bar-fill" id="storageBar" style="width:0%"></div></div>
      <div class="storage-text" id="storageDetail"></div>
    </div>
  </aside>

  <!-- メイン -->
  <div class="main">
    <!-- トップバー -->
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="検索..." oninput="onSearch()">
      </div>
      <div class="topbar-actions">
        <button class="btn-logout" onclick="logout()" title="ログアウト">↩</button>
      </div>
    </div>

    <!-- ツールバー -->
    <div class="toolbar">
      <button class="btn btn-accent desktop-upload" onclick="document.getElementById('fileInput').click()">📤 アップロード</button>
      <button class="btn" onclick="openMkdirModal()">📁+ フォルダ作成</button>
      <input type="file" id="fileInput" multiple hidden onchange="uploadFiles()">
    </div>

    <!-- コンテンツ -->
    <div class="content" id="dropZone">
      <div class="file-grid" id="fileGrid"></div>
    </div>
  </div>
</div>

<!-- FABアップロード -->
<button class="fab-upload" id="fabUpload" onclick="document.getElementById('fileInput').click()">+</button>

<!-- アップロード進捗 -->
<div class="upload-progress" id="uploadProgress">
  <div class="text" id="uploadText">アップロード中...</div>
  <div class="bar-track"><div class="bar-fill" id="uploadBar"></div></div>
</div>

<!-- フォルダ作成モーダル -->
<div class="modal-overlay" id="mkdirModal">
  <div class="modal">
    <h3>📁 新しいフォルダ</h3>
    <input type="text" id="mkdirName" placeholder="フォルダ名">
    <div class="modal-btns">
      <button onclick="closeMkdirModal()">キャンセル</button>
      <button class="primary" onclick="createFolder()">作成</button>
    </div>
  </div>
</div>

<!-- リネームモーダル -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>✏️ 名前を変更</h3>
    <input type="text" id="renameName" placeholder="新しい名前">
    <input type="hidden" id="renameOld">
    <div class="modal-btns">
      <button onclick="closeRenameModal()">キャンセル</button>
      <button class="primary" onclick="renameItem()">変更</button>
    </div>
  </div>
</div>

<!-- プレビュー -->
<div class="preview-overlay" id="previewOverlay">
  <button class="close-btn" onclick="closePreview()">✕</button>
  <div class="preview-content" id="previewContent"></div>
</div>

<script>
// ── 状態 ──
let token = localStorage.getItem('mc_token') || '';
let currentPath = '';
let searchTimeout = null;

// ── 認証 ──
async function login() {
  const pass = document.getElementById('loginPass').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('mc_token', token);
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('fabUpload').style.display = '';
      loadFiles();
      loadStorageInfo();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function logout() {
  await fetch('/api/logout', { method: 'POST', headers: authHeaders() });
  token = '';
  localStorage.removeItem('mc_token');
  location.reload();
}

function authHeaders() {
  return { 'X-Auth-Token': token };
}

// ── 初期化 ──
(async function init() {
  if (token) {
    try {
      const res = await fetch('/api/files', { headers: authHeaders() });
      if (res.ok) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadFiles();
        loadStorageInfo();
        return;
      }
    } catch (e) {}
    token = '';
    localStorage.removeItem('mc_token');
  }
})();

// ── サイドバー ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
}

// ── ファイル一覧 ──
async function loadFiles() {
  try {
    const url = '/api/files' + (currentPath ? '?path=' + encodeURIComponent(currentPath) : '');
    const res = await fetch(url, { headers: authHeaders() });
    if (!res.ok) throw new Error();
    const data = await res.json();
    renderBreadcrumb();
    renderFiles(data.files || []);
  } catch (e) {
    document.getElementById('fileGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>読み込みに失敗しました</p></div>';
  }
}

async function loadStorageInfo() {
  try {
    const res = await fetch('/api/storage-info', { headers: authHeaders() });
    const data = await res.json();
    const used = formatSize(data.used || 0);
    const max = formatSize(data.max || 0);
    const pct = data.max ? ((data.used / data.max) * 100).toFixed(1) : 0;
    document.getElementById('storageText').textContent = `${used} / ${max}`;
    document.getElementById('storageBar').style.width = pct + '%';
    document.getElementById('storageDetail').textContent = `${pct}% 使用中`;
  } catch (e) {}
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<a href="#" onclick="navigateTo(\'\'); return false;">🏠 ホーム</a>';
  if (currentPath) {
    const parts = currentPath.split('/');
    let path = '';
    for (const p of parts) {
      path += (path ? '/' : '') + p;
      const pp = path;
      html += `<span>/</span><a href="#" onclick="navigateTo('${escHtml(pp)}'); return false;">${escHtml(p)}</a>`;
    }
  }
  bc.innerHTML = html;
}

function renderFiles(files) {
  const grid = document.getElementById('fileGrid');
  if (!files.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>ファイルがありません</p></div>';
    return;
  }
  const dirs = files.filter(f => f.type === 'directory').sort((a, b) => a.name.localeCompare(b.name));
  const fls = files.filter(f => f.type !== 'directory').sort((a, b) => a.name.localeCompare(b.name));
  grid.innerHTML = [...dirs, ...fls].map(f => {
    if (f.type === 'directory') {
      return `<div class="file-card" onclick="navigateTo('${escHtml(f.path)}')">
        <div class="actions">
          <button onclick="event.stopPropagation(); openRenameModal('${escHtml(f.name)}')" title="リネーム">✏</button>
          <button onclick="event.stopPropagation(); deleteItem('${escHtml(f.path)}')" title="削除">🗑</button>
        </div>
        <div class="icon">📁</div>
        <div class="name">${escHtml(f.name)}</div>
        <div class="meta">フォルダ</div>
      </div>`;
    }
    const icon = getFileIcon(f.name);
    const isImg = /\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(f.name);
    const thumb = isImg ? `<img class="thumb" src="/api/preview?path=${encodeURIComponent(f.path)}&token=${token}" loading="lazy" alt="">` : `<div class="icon">${icon}</div>`;
    return `<div class="file-card" onclick="previewFile('${escHtml(f.path)}', '${escHtml(f.name)}')">
      <div class="actions">
        <button onclick="event.stopPropagation(); downloadFile('${escHtml(f.path)}')" title="ダウンロード">⬇</button>
        <button onclick="event.stopPropagation(); openRenameModal('${escHtml(f.name)}')" title="リネーム">✏</button>
        <button onclick="event.stopPropagation(); deleteItem('${escHtml(f.path)}')" title="削除">🗑</button>
      </div>
      ${thumb}
      <div class="name">${escHtml(f.name)}</div>
      <div class="meta">${formatSize(f.size)}</div>
    </div>`;
  }).join('');
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', ppt:'📙', pptx:'📙',
    zip:'🗜️', rar:'🗜️', '7z':'🗜️', mp3:'🎵', wav:'🎵', ogg:'🎵', flac:'🎵', aac:'🎵',
    mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬', webm:'🎬',
    js:'📜', ts:'📜', py:'🐍', html:'🌐', css:'🎨', json:'📋', txt:'📝', md:'📝',
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', svg:'🖼️', webp:'🖼️' };
  return icons[ext] || '📄';
}

// ── ナビゲーション ──
function navigateTo(path) {
  currentPath = path;
  loadFiles();
  closeSidebar();
}

// ── アップロード ──
async function uploadFiles() {
  const input = document.getElementById('fileInput');
  const files = Array.from(input.files);
  if (!files.length) return;

  const prog = document.getElementById('uploadProgress');
  const bar = document.getElementById('uploadBar');
  const text = document.getElementById('uploadText');
  prog.classList.add('active');

  let completed = 0;
  let failed = 0;
  const total = files.length;
  const maxParallel = 2;

  async function uploadOne(file) {
    return new Promise((resolve) => {
      const form = new FormData();
      form.append('file', file);
      if (currentPath) form.append('path', currentPath);
      const xhr = new XMLHttpRequest();
           xhr.open('POST', '/api/upload' + (currentPath ? '?path=' + encodeURIComponent(currentPath) : ''));
      xhr.setRequestHeader('X-Auth-Token', token);
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const filePct = (e.loaded / e.total) * 100;
          const totalPct = ((completed / total) * 100) + (filePct / total);
          bar.style.width = Math.min(totalPct, 100) + '%';
          text.textContent = `${completed + 1}/${total} アップロード中... ${file.name}`;
        }
      };
      xhr.onload = () => {
        if (xhr.status >= 200 && xhr.status < 300) completed++;
        else failed++;
        resolve();
      };
      xhr.onerror = () => { failed++; resolve(); };
      xhr.send(form);
    });
  }

  // 並列制限付き
  let idx = 0;
  async function worker() {
    while (idx < files.length) {
      const file = files[idx++];
      await uploadOne(file);
    }
  }
  const workers = [];
  for (let i = 0; i < Math.min(maxParallel, files.length); i++) workers.push(worker());
  await Promise.all(workers);

  bar.style.width = '100%';
  text.textContent = `完了！ ${completed}件成功` + (failed ? ` / ${failed}件失敗` : '');
  try { new Audio('/アップロード完了.wav').play(); } catch(e) {}
  setTimeout(() => prog.classList.remove('active'), 2000);
  loadFiles();
  loadStorageInfo();
  input.value = '';
}

// ── ドラッグ&ドロップ ──
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.outline = '2px dashed var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.outline = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.outline = '';
  const input = document.getElementById('fileInput');
  input.files = e.dataTransfer.files;
  uploadFiles();
});

// ── フォルダ作成 ──
function openMkdirModal() { document.getElementById('mkdirModal').classList.add('active'); document.getElementById('mkdirName').value = ''; document.getElementById('mkdirName').focus(); }
function closeMkdirModal() { document.getElementById('mkdirModal').classList.remove('active'); }
async function createFolder() {
  const name = document.getElementById('mkdirName').value.trim();
  if (!name) return;
  await fetch('/api/mkdir', {
    method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, path: currentPath })
  });
  closeMkdirModal();
  loadFiles();
}

// ── リネーム ──
function openRenameModal(oldName) { document.getElementById('renameModal').classList.add('active'); document.getElementById('renameOld').value = oldName; document.getElementById('renameName').value = oldName; document.getElementById('renameName').focus(); }
function closeRenameModal() { document.getElementById('renameModal').classList.remove('active'); }
async function renameItem() {
  const oldName = document.getElementById('renameOld').value;
  const newName = document.getElementById('renameName').value.trim();
  if (!newName || newName === oldName) { closeRenameModal(); return; }
  const oldPath = currentPath ? currentPath + '/' + oldName : oldName;
  await fetch('/api/rename', {
    method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ oldPath, newName })
  });
  closeRenameModal();
  loadFiles();
}

// ── 削除 ──
async function deleteItem(path) {
  if (!confirm('削除しますか？')) return;
  await fetch('/api/delete', {
    method: 'DELETE', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ path })
  });
  loadFiles();
  loadStorageInfo();
}

// ── ダウンロード ──
function downloadFile(path) {
  const a = document.createElement('a');
  a.href = '/api/download?path=' + encodeURIComponent(path) + '&token=' + token;
  a.download = '';
  a.click();
}

// ── プレビュー ──
function previewFile(path, name) {
  const overlay = document.getElementById('previewOverlay');
  const content = document.getElementById('previewContent');
  const ext = name.split('.').pop().toLowerCase();
  const url = '/api/preview?path=' + encodeURIComponent(path) + '&token=' + token;

  if (/^(jpg|jpeg|png|gif|webp|svg|bmp)$/.test(ext)) {
    content.innerHTML = `<img src="${url}" alt="${escHtml(name)}">`;
  } else if (/^(mp4|webm|mov)$/.test(ext)) {
    content.innerHTML = `<video src="${url}" controls autoplay style="max-width:95vw;max-height:80vh;"></video>`;
  } else if (/^(mp3|wav|ogg|flac|aac)$/.test(ext)) {
    content.innerHTML = `<div style="text-align:center;padding:40px;"><div style="font-size:3rem;margin-bottom:16px;">🎵</div><p style="margin-bottom:16px;">${escHtml(name)}</p><audio src="${url}" controls autoplay></audio></div>`;
  } else if (/^(txt|md|json|js|ts|py|html|css|csv|log|xml|yaml|yml|ini|cfg|sh|bat)$/.test(ext)) {
    fetch(url).then(r => r.text()).then(t => {
      content.innerHTML = `<pre>${escHtml(t)}</pre>`;
    });
  } else if (ext === 'pdf') {
    content.innerHTML = `<iframe src="${url}" style="width:95vw;height:85vh;border:none;border-radius:8px;"></iframe>`;
  } else {
    content.innerHTML = `<div style="text-align:center;padding:40px;"><div style="font-size:3rem;margin-bottom:16px;">${getFileIcon(name)}</div><p>${escHtml(name)}</p><p style="color:var(--dim);margin-top:8px;">プレビューできません</p><button class="btn" style="margin-top:16px;" onclick="downloadFile('${escHtml(path)}'); closePreview();">ダウンロード</button></div>`;
  }
  overlay.classList.add('active');
}
function closePreview() {
  const o = document.getElementById('previewOverlay');
  o.classList.remove('active');
  document.getElementById('previewContent').innerHTML = '';
}

// ── 検索 ──
function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { loadFiles(); return; }
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q), { headers: authHeaders() });
      const data = await res.json();
      renderFiles(data.files || []);
    } catch (e) {}
  }, 400);
}

// ── スワイプでプレビュー閉じ ──
let touchStartY = 0;
document.getElementById('previewOverlay').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('previewOverlay').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(diff) > 100) closePreview();
});

// ── キーボード ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePreview();
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
  }
});

// ── ユーティリティ ──
function formatSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
